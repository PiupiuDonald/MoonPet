<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css-js/style.css">
    <title>MoonPet</title>
</head>
<body>
    <header>
        <nav class="menu">
            <input type="checkbox" class="menu-faketrigger">
            <div class="menu-lines">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <ul>
                <li><a href="#">Adote</a></li>
                <li><a href="#">Doe</a></li>
                <li><a href="#">Fale Conosco</a></li>
            </ul>
        </nav>
        <h1 class="logo">logo</h1>
    </header>
    <hr color="#30E389">
    <main>
        <div class="Introducao">
            <!--Titulo da Pagina-->
            <h1 class="titulo">MoonPet</h1>
            <!--Fim Titulo da Pagina-->

            <!--Slider-->
            <div class="slider">
                <div class="slides">
                    <!--Radio Button-->
                    <input type="radio" name="radio-btn" id="radio1">
                    <input type="radio" name="radio-btn" id="radio2">
                    <input type="radio" name="radio-btn" id="radio3">
                    <input type="radio" name="radio-btn" id="radio4">
                    <!--Fim Radio Button-->

                    <!--Imagens do Slide-->
                    <div class="slide first">
                        <img src="img/MicrosoftTeams-image (1).png" alt="Slide1">
                    </div>
                    <div class="slide">
                        <img src="img/MicrosoftTeams-image (2).png" alt="Slide2">
                    </div>
                    <div class="slide">
                        <img src="img/vista-lateral-sorridente-mulher-abracando-cachorro (1).jpg" alt="Slide3">
                    </div>
                    <div class="slide">
                        <img src="img/closeup-person-feeding-turquoise-fronted-amazon-standing-wooden-fence-sunlight_181624-36198.avif" alt="Slide4">
                    </div>
                    <!--Fim dos Slides-->
                    
                    <!--Navigation Auto-->
                    <div class="navigation-auto">
                        <div class="auto-btn1"></div>
                        <div class="auto-btn2"></div>
                        <div class="auto-btn3"></div>
                        <div class="auto-btn4"></div>
                    </div>
                </div>
                <div class="manual-navigation">
                    <label for="radio1" class="manual-btn"></label>
                    <label for="radio2" class="manual-btn"></label>
                    <label for="radio3" class="manual-btn"></label>
                    <label for="radio4" class="manual-btn"></label>
                </div>
            </div>
            <!--Fim do Slider-->
        </div>
    </main>
    <!--Scripts-->
    <script src="css-js/JavaScript.js"></script>
</body>
</html>
